version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: boxing_db_container
    restart: always
    environment:
      MYSQL_DATABASE: boxing_club
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - boxing_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: boxing_admin_container
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root

volumes:
  boxing_data: